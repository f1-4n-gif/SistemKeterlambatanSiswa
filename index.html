<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Rekap Keterlambatan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @media print { 
            .print-hidden { display: none !important; } 
            body { background: white; } 
            .print-card { border: none !important; box-shadow: none !important; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icons = {
            Input: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><polyline points="7 15 12 10 17 15"/></svg>,
            History: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>,
            Printer: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>,
            UserPlus: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="16" y1="11" x2="22" y2="11"/></svg>,
            Search: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
            CheckCircle: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
            AlertTriangle: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,
            X: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
            Download: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
            Filter: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
        };

        const MONTHS = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
        const INITIAL_STUDENTS = [
            { id: '2024001', name: 'Ahmad Fauzi', class: '7-A' },
            { id: '2023045', name: 'Larasati Putri', class: '8-C' },
            { id: '2022089', name: 'Kevin Pratama', class: '9-F' }
        ];

        const App = () => {
            const [currentUser, setCurrentUser] = useState(null);
            const [students, setStudents] = useState(INITIAL_STUDENTS);
            const [lateLogs, setLateLogs] = useState([]);
            const [activeTab, setActiveTab] = useState('input');
            const [nisInput, setNisInput] = useState('');
            const [statusMsg, setStatusMsg] = useState({ type: '', text: '', subText: '' });
            const [searchTerm, setSearchTerm] = useState('');
            const [filterMonth, setFilterMonth] = useState(new Date().getMonth());
            const [filterYear, setFilterYear] = useState(new Date().getFullYear());
            const [currentDateTime, setCurrentDateTime] = useState('');

            const THRESHOLD = 3;
            const LOGO_URL = "https://i.ibb.co.com/TDbjTCHF/logo.png";

            useEffect(() => {
                const savedLogs = localStorage.getItem('lateLogs_v4');
                const savedStudents = localStorage.getItem('students_v4');
                const savedUser = localStorage.getItem('currentUser_v4');
                if (savedLogs) setLateLogs(JSON.parse(savedLogs));
                if (savedStudents) setStudents(JSON.parse(savedStudents));
                if (savedUser) setCurrentUser(JSON.parse(savedUser));

                const updateClock = () => {
                    const now = new Date();
                    setCurrentDateTime(now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }));
                };
                updateClock();
                const timer = setInterval(updateClock, 60000);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                localStorage.setItem('lateLogs_v4', JSON.stringify(lateLogs));
                localStorage.setItem('students_v4', JSON.stringify(students));
                if (currentUser) localStorage.setItem('currentUser_v4', JSON.stringify(currentUser));
            }, [lateLogs, students, currentUser]);

            const downloadExcelFormat = () => {
                const wsData = [
                    ["NISN", "Nama Lengkap", "Kelas"],
                    ["2024001", "Ahmad Fauzi", "7-A"],
                    ["2023045", "Larasati Putri", "8-C"]
                ];
                const ws = XLSX.utils.aoa_to_sheet(wsData);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Data Siswa");
                XLSX.writeFile(wb, "Format_Data_Siswa.xlsx");
            };

            const handleRecordLate = (nisn) => {
                const targetNis = nisn.trim();
                if (!targetNis) return;

                const student = students.find(s => s.id === targetNis);
                if (!student) {
                    setStatusMsg({ type: 'error', text: `NISN ${targetNis} Tidak Terdaftar!`, subText: 'Periksa kembali atau daftarkan di Database.' });
                    setNisInput('');
                    return;
                }

                const now = new Date();
                const freq = lateLogs.filter(log => {
                    const logDate = new Date(log.id);
                    return log.nisn === targetNis && logDate.getMonth() === now.getMonth() && logDate.getFullYear() === now.getFullYear();
                }).length + 1;

                const newLog = {
                    id: Date.now(),
                    nisn: student.id,
                    name: student.name,
                    class: student.class,
                    timestamp: now.toLocaleString('id-ID'),
                    recordedBy: currentUser.name 
                };

                setLateLogs(prev => [newLog, ...prev]);
                
                if (freq >= THRESHOLD) {
                    setStatusMsg({ type: 'warning', text: `PERINGATAN: ${student.name}`, subText: `Terdeteksi ${freq}x terlambat pada bulan ${MONTHS[now.getMonth()]}.` });
                } else {
                    setStatusMsg({ type: 'success', text: `Berhasil Dicatat: ${student.name}`, subText: `Kehadiran terlambat ke-${freq} bulan ini.` });
                }
                
                setNisInput('');
                setTimeout(() => setStatusMsg({ type: '', text: '', subText: '' }), 4000);
            };

            const filteredRecap = useMemo(() => {
                const recap = {};
                lateLogs.forEach(log => {
                    const logDate = new Date(log.id);
                    if (logDate.getMonth() === parseInt(filterMonth) && logDate.getFullYear() === parseInt(filterYear)) {
                        if (!recap[log.nisn]) {
                            const sInfo = students.find(s => s.id === log.nisn);
                            recap[log.nisn] = { id: log.nisn, name: sInfo?.name || 'Siswa Terhapus', class: sInfo?.class || '-', count: 0 };
                        }
                        recap[log.nisn].count += 1;
                    }
                });
                return Object.values(recap).sort((a, b) => b.count - a.count);
            }, [lateLogs, filterMonth, filterYear, students]);

            const availableYears = useMemo(() => {
                const years = new Set([new Date().getFullYear()]);
                lateLogs.forEach(log => years.add(new Date(log.id).getFullYear()));
                return Array.from(years).sort((a, b) => b - a);
            }, [lateLogs]);

            if (!currentUser) {
                return (
                    <div className="min-h-screen bg-slate-900 flex flex-col items-center justify-center p-6">
                        {/* Judul Utama Di Luar Card */}
                        <div className="text-center mb-8 space-y-2">
                            <h2 className="text-2xl md:text-4xl font-black text-white uppercase tracking-[0.2em] drop-shadow-lg">
                                PRESENSI KETERLAMBATAN SISWA
                            </h2>
                            <div className="h-1.5 w-24 bg-indigo-500 mx-auto rounded-full"></div>
                        </div>

                        <div className="w-full max-w-md bg-white rounded-[40px] shadow-2xl overflow-hidden">
                            <div className="p-10 text-center bg-indigo-600 text-white">
                                <img src={LOGO_URL} className="w-20 h-20 mx-auto mb-4 bg-white p-2 rounded-2xl" alt="Logo" />
                                <h1 className="text-xl font-black uppercase tracking-tight opacity-90">Login Guru Piket</h1>
                            </div>
                            <form onSubmit={(e) => {
                                e.preventDefault();
                                const name = e.target.teacherName.value;
                                if (name.trim()) setCurrentUser({ name, time: new Date().toLocaleDateString('id-ID') });
                            }} className="p-10 space-y-6">
                                <div className="space-y-2">
                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Nama Petugas</label>
                                    <input name="teacherName" required placeholder="Nama Anda..." className="w-full border-2 border-slate-100 rounded-2xl p-4 font-bold outline-none focus:border-indigo-500 transition-all" />
                                </div>
                                <button className="w-full bg-slate-900 text-white py-4 rounded-2xl font-black uppercase tracking-widest hover:bg-black transition-all shadow-lg">Masuk Sistem</button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col pb-20">
                    <header className="bg-white border-b p-4 sticky top-0 z-20 print-hidden">
                        <div className="max-w-4xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <img src={LOGO_URL} className="w-10 h-10 object-contain" alt="Logo" />
                                <div className="hidden sm:block">
                                    <h1 className="text-sm font-black uppercase text-indigo-600">Presensi Keterlambatan</h1>
                                    <p className="text-[10px] font-bold text-slate-400 uppercase">{currentDateTime}</p>
                                </div>
                            </div>
                            <div className="flex items-center gap-4">
                                <div className="text-right">
                                    <p className="text-[10px] font-black uppercase text-slate-400">Petugas</p>
                                    <p className="text-xs font-bold">{currentUser.name}</p>
                                </div>
                                <button onClick={() => setCurrentUser(null)} className="text-red-500 p-2 hover:bg-red-50 rounded-xl transition-all"><Icons.X /></button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto w-full p-6 flex-1">
                        <nav className="flex gap-2 mb-8 bg-white p-1.5 rounded-2xl shadow-sm border border-slate-100 print-hidden">
                            {[
                                { id: 'input', label: 'Input NISN', icon: Icons.Input },
                                { id: 'history', label: 'Riwayat', icon: Icons.History },
                                { id: 'recap', label: 'Laporan Bulanan', icon: Icons.Printer },
                                { id: 'admin', label: 'Siswa', icon: Icons.UserPlus },
                            ].map((tab) => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex-1 py-3.5 rounded-xl flex items-center justify-center gap-2 transition-all font-bold text-[11px] uppercase tracking-wider ${activeTab === tab.id ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-100' : 'text-slate-400 hover:bg-slate-50'}`}>
                                    <tab.icon /> <span className="hidden sm:inline">{tab.label}</span>
                                </button>
                            ))}
                        </nav>

                        {activeTab === 'input' && (
                            <div className="max-w-xl mx-auto space-y-6">
                                <div className="bg-white p-8 rounded-[40px] shadow-sm border border-slate-100 text-center space-y-6">
                                    <div className="w-20 h-20 bg-indigo-50 text-indigo-600 rounded-3xl flex items-center justify-center mx-auto mb-4">
                                        <Icons.Input />
                                    </div>
                                    <div className="space-y-2">
                                        <h2 className="text-xl font-black uppercase">Pencatatan NISN</h2>
                                        <p className="text-xs text-slate-400 font-medium italic">Silakan scan barcode kartu pelajar atau ketik NISN secara manual</p>
                                    </div>
                                    <div className="relative">
                                        <input 
                                            autoFocus
                                            type="text" 
                                            value={nisInput} 
                                            onChange={(e) => setNisInput(e.target.value)} 
                                            onKeyDown={(e) => e.key === 'Enter' && handleRecordLate(nisInput)}
                                            placeholder="Ketik NISN..." 
                                            className="w-full border-4 border-slate-50 rounded-3xl p-6 text-center text-2xl font-black outline-none focus:border-indigo-100 transition-all placeholder:text-slate-200" 
                                        />
                                    </div>
                                    <button onClick={() => handleRecordLate(nisInput)} className="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black uppercase tracking-widest shadow-xl hover:bg-indigo-700 transition-all active:scale-[0.98]">Catat Keterlambatan</button>
                                </div>

                                {statusMsg.text && (
                                    <div className={`p-6 rounded-3xl flex items-center gap-4 border-2 animate-bounce ${statusMsg.type === 'success' ? 'bg-emerald-50 text-emerald-700 border-emerald-100' : statusMsg.type === 'warning' ? 'bg-amber-50 text-amber-700 border-amber-100' : 'bg-rose-50 text-rose-700 border-rose-100'}`}>
                                        <div className="p-2 bg-white rounded-xl">{statusMsg.type === 'error' ? <Icons.AlertTriangle /> : <Icons.CheckCircle />}</div>
                                        <div>
                                            <p className="font-black uppercase text-sm">{statusMsg.text}</p>
                                            <p className="text-xs opacity-70 font-bold">{statusMsg.subText}</p>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === 'history' && (
                            <div className="bg-white rounded-[32px] shadow-sm border border-slate-100 overflow-hidden">
                                <div className="p-6 border-b bg-slate-50/50 flex justify-between items-center">
                                    <h2 className="font-black uppercase text-[11px] tracking-widest text-slate-400">Log Hari Ini</h2>
                                    <button onClick={() => setLateLogs([])} className="text-[10px] font-black text-rose-500 uppercase hover:underline">Hapus Semua</button>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left text-sm">
                                        <thead className="bg-slate-50 text-slate-400 font-bold text-[10px] uppercase">
                                            <tr><th className="p-4">Siswa</th><th className="p-4">Waktu</th><th className="p-4">Petugas</th></tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {lateLogs.length > 0 ? lateLogs.map(log => (
                                                <tr key={log.id} className="hover:bg-slate-50/50">
                                                    <td className="p-4">
                                                        <div className="font-bold text-slate-800">{log.name}</div>
                                                        <div className="text-[10px] text-slate-400 font-bold uppercase">{log.nisn} • {log.class}</div>
                                                    </td>
                                                    <td className="p-4 font-bold text-indigo-600 text-xs">{log.timestamp}</td>
                                                    <td className="p-4 text-slate-400 text-[10px] font-black uppercase">{log.recordedBy}</td>
                                                </tr>
                                            )) : <tr><td colSpan="3" className="p-20 text-center text-slate-300 font-black uppercase text-[10px] tracking-widest">Belum ada data rekaman</td></tr>}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {activeTab === 'recap' && (
                            <div className="space-y-6">
                                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 print-hidden">
                                    <div className="flex items-center gap-3 bg-white p-3 rounded-2xl shadow-sm border border-slate-100">
                                        <Icons.Filter />
                                        <select value={filterMonth} onChange={(e) => setFilterMonth(e.target.value)} className="bg-transparent font-black uppercase text-[11px] outline-none border-r pr-3">
                                            {MONTHS.map((m, i) => <option key={i} value={i}>{m}</option>)}
                                        </select>
                                        <select value={filterYear} onChange={(e) => setFilterYear(e.target.value)} className="bg-transparent font-black uppercase text-[11px] outline-none">
                                            {availableYears.map(y => <option key={y} value={y}>{y}</option>)}
                                        </select>
                                    </div>
                                    <button onClick={() => window.print()} className="bg-slate-900 text-white px-6 py-3.5 rounded-2xl font-black uppercase text-[10px] tracking-widest flex items-center gap-2 hover:bg-black shadow-lg shadow-slate-200">
                                        <Icons.Printer /> Cetak Laporan
                                    </button>
                                </div>

                                <div className="bg-white rounded-[40px] shadow-sm border border-slate-100 overflow-hidden print-card">
                                    <div className="hidden print:block p-12 text-center border-b-4 border-double border-slate-900 mb-8">
                                        <img src={LOGO_URL} className="w-24 h-24 mx-auto mb-4" />
                                        <h1 className="text-2xl font-black uppercase">Rekapitulasi Keterlambatan Siswa</h1>
                                        <p className="text-sm font-bold text-slate-500 uppercase mt-1">Periode: {MONTHS[filterMonth]} {filterYear}</p>
                                    </div>

                                    <div className="p-6 border-b bg-indigo-50/30 flex justify-between items-center print-hidden">
                                        <h2 className="font-black uppercase text-[10px] tracking-widest text-indigo-600">Daftar Akumulasi Bulanan</h2>
                                        <span className="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full text-[10px] font-black uppercase">{filteredRecap.length} Siswa</span>
                                    </div>

                                    <table className="w-full text-sm">
                                        <thead className="bg-slate-50 text-slate-400 font-black text-[10px] uppercase">
                                            <tr><th className="p-6">Identitas Siswa</th><th className="p-6 text-center">Jumlah Alpa/Telat</th><th className="p-6">Status/Tindakan</th></tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {filteredRecap.length > 0 ? filteredRecap.map(item => (
                                                <tr key={item.id} className={item.count >= THRESHOLD ? 'bg-rose-50/30' : ''}>
                                                    <td className="p-6">
                                                        <div className="font-black text-slate-800 text-base">{item.name}</div>
                                                        <div className="text-[10px] font-bold text-slate-400 uppercase">NISN: {item.id} • Kelas {item.class}</div>
                                                    </td>
                                                    <td className="p-6 text-center">
                                                        <div className={`w-12 h-12 rounded-2xl flex items-center justify-center mx-auto text-lg font-black ${item.count >= THRESHOLD ? 'bg-rose-600 text-white shadow-lg shadow-rose-200' : 'bg-slate-100 text-slate-600'}`}>
                                                            {item.count}
                                                        </div>
                                                    </td>
                                                    <td className="p-6">
                                                        {item.count >= THRESHOLD ? (
                                                            <div className="flex items-center gap-2 text-rose-600 font-black uppercase text-[10px]">
                                                                <Icons.AlertTriangle />
                                                                <span>Panggilan Ortu / Guru BK</span>
                                                            </div>
                                                        ) : (
                                                            <div className="text-slate-400 font-black uppercase text-[10px]">Teguran Lisan</div>
                                                        )}
                                                    </td>
                                                </tr>
                                            )) : (
                                                <tr><td colSpan="3" className="p-24 text-center text-slate-300 font-black uppercase text-[11px] tracking-[0.2em]">Tidak ada data untuk periode ini</td></tr>
                                            )}
                                        </tbody>
                                    </table>

                                    <div className="hidden print:grid grid-cols-2 gap-20 p-16 mt-12 text-center">
                                        <div className="space-y-24">
                                            <p className="font-bold uppercase text-xs">Petugas Piket,</p>
                                            <div className="border-t border-slate-900 pt-3 font-black uppercase text-xs">{currentUser.name}</div>
                                        </div>
                                        <div className="space-y-24">
                                            <p className="font-bold uppercase text-xs">Kepala Kesiswaan / BK,</p>
                                            <div className="border-t border-slate-900 pt-3 font-black uppercase text-xs">( ........................................ )</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'admin' && (
                            <div className="space-y-8">
                                <div className="bg-white p-8 rounded-[40px] shadow-sm border border-slate-100">
                                    <div className="flex justify-between items-center mb-6">
                                        <h3 className="font-black text-[10px] uppercase text-indigo-600 tracking-widest">Tambah Data Siswa</h3>
                                        <button onClick={downloadExcelFormat} className="flex items-center gap-2 text-emerald-600 font-black text-[10px] uppercase tracking-widest hover:bg-emerald-50 px-4 py-2 rounded-xl transition-all">
                                            <Icons.Download /> Download Format Excel
                                        </button>
                                    </div>
                                    <form onSubmit={(e) => {
                                        e.preventDefault();
                                        const fd = new FormData(e.target);
                                        const id = fd.get('nis');
                                        if (students.some(s => s.id === id)) return alert('NISN sudah ada!');
                                        setStudents([...students, { id, name: fd.get('nm'), class: fd.get('kls') }]);
                                        e.target.reset();
                                    }} className="grid md:grid-cols-4 gap-4">
                                        <input name="nis" placeholder="NISN Siswa" required className="bg-slate-50 border-2 border-slate-50 rounded-2xl p-4 text-xs font-bold focus:border-indigo-100 outline-none" />
                                        <input name="nm" placeholder="Nama Lengkap" required className="bg-slate-50 border-2 border-slate-50 rounded-2xl p-4 text-xs font-bold focus:border-indigo-100 outline-none" />
                                        <input name="kls" placeholder="Kelas (ex: 8-B)" required className="bg-slate-50 border-2 border-slate-50 rounded-2xl p-4 text-xs font-bold focus:border-indigo-100 outline-none" />
                                        <button className="bg-slate-900 text-white rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-black transition-all">Simpan</button>
                                    </form>
                                </div>

                                <div className="bg-white rounded-[32px] shadow-sm border border-slate-100 overflow-hidden">
                                    <div className="p-6 bg-slate-50/50 border-b flex justify-between items-center">
                                        <span className="font-black text-[10px] text-slate-400 uppercase tracking-widest">Database Siswa ({students.length})</span>
                                        <div className="relative">
                                            <span className="absolute left-3 top-2.5 text-slate-300"><Icons.Search /></span>
                                            <input placeholder="Cari..." className="pl-10 pr-4 py-2 border rounded-full text-[11px] font-bold outline-none focus:border-indigo-500 w-40" onChange={(e) => setSearchTerm(e.target.value)} />
                                        </div>
                                    </div>
                                    <div className="max-h-80 overflow-y-auto">
                                        <table className="w-full text-sm">
                                            <tbody className="divide-y divide-slate-100">
                                                {students.filter(s => s.name.toLowerCase().includes(searchTerm.toLowerCase()) || s.id.includes(searchTerm)).map(student => (
                                                    <tr key={student.id} className="hover:bg-slate-50 transition-colors">
                                                        <td className="p-5 font-black text-slate-700">{student.name}</td>
                                                        <td className="p-5 text-slate-400 text-[11px] font-bold uppercase">{student.id} &bull; {student.class}</td>
                                                        <td className="p-5 text-right"><button onClick={() => setStudents(students.filter(s => s.id !== student.id))} className="text-slate-200 hover:text-rose-500"><Icons.X /></button></td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t p-4 text-center text-[10px] font-black text-slate-400 uppercase tracking-widest print-hidden">
                        Sistem Monitoring Keterlambatan Siswa &bull; {new Date().getFullYear()}
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
